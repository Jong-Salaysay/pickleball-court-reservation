<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book a court</title>
        <link rel="stylesheet" href="/css/main.css"/>    
    </head>
    <body>
        <header class = "navbar">
            <div class = "navbar__brand"> Pickleball Court</div>
            <nav class="navbar__links">
                <a href="/">Home</a>
                <a href="/#rates">Rates</a>
                <a href="/#contact">Contact</a>
                <a href="/login.html">Login</a>
                <a href="/register.html" class="btn btn--light">Register</a>
            </nav>
        </header>
        <main class="calendar-page">
        <div class="calendar-head">
            <h1>Court availability this week</h1>
        </div>
        <div class="legend">
            <span class="legend-item"><span class="chip chip--available"></span>Available</span>
            <span class="legend-item"><span class="chip chip--reserved"></span>Reserved</span>
            <span class="legend-item"><span class="chip chip--open_play"></span>Open Play</span>
            <span class="legend-item"><span class="chip chip--blocked"></span>Unavailable</span>
        </div>

        <div id="slots" class="slots"> </div>
                <div id="booking-modal" class="modal hidden">
            <div class="modal__card">
                <h2>Book the Court</h2>
                <p id="modal-slot"></p>
                <div class="field">
                    <label for="duration">Duration</label>
                    <select id="duration">
                        <option value="1">1 hour</option>
                        <option value="2">2 hours</option>
                        <option value="3">3 hours</option>
                    </select>
                </div>
                <div class="field">
                    <label for="payment">Payment method</label>
                    <select id="payment">
                        <option value="ewallet">E-wallet (GCash)</option>
                        <option value="cash">Cash on site</option>
                    </select>
                </div>
                <p id="modal-summary" class="summary"></p>
                <button id="confirm-booking" class="btn btn--primary btn--full">Confirm Booking</button>
                <button id="cancel-booking" class="btn-cancel">Cancel</button>
            </div>
        </div>

        </main>
        <script src="/js/nav.js"></script>
        <script src="/js/calendar.js"></script>
    </body>
