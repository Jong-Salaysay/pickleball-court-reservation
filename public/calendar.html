<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Book a court</title>
        <link rel="stylesheet" href="/css/main.css"/>    
    </head>
    <body>
        <header class = "navbar">
            <div class = "navbar__brand"> Pickleball Court</div>
            <nav class="navbar__links">
                <a href="/">Home</a>
                <a href="#rates">Rates</a>
                <a href="#contact">Contact</a>
                <a href="/login.html">Login</a>
                <a href="/register.html" class="btn btn--light">Register</a>
            </nav>
        </header>
        <main class="calendar-page">
        <div class="calendar-head">
            <h1>Court availability</h1>
            <div class="date-picker">
                <label for="date">Date: </label>
                <input type="date" id="date">
            </div>
        </div>
        <div class="legend">
            <span class="legend-item"><span class="chip chip--available"></span>Available</span>
            <span class="legend-item"><span class="chip chip--reserved"></span>Reserved</span>
            <span class="legend-item"><span class="chip chip--open_play"></span>Open Play</span>
            <span class="legend-item"><span class="chip chip--blocked"></span>Unavailable</span>
        </div>

        <div id="slots" class="slots"> </div>

        </main>
        <script src="/js/nav.js"></script>
        <script src="/js/calendar.js"></script>
    </body>
