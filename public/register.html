<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Create your account</title>
        <link rel="stylesheet" href="/css/main.css"/>    
    </head>
    <body>
        <header class = "navbar">
            <div class = "navbar__brand"> Pickleball Court</div>
            <nav class="navbar__links">
                <a href="/">Home</a>
                <a href="/#rates">Rates</a>
                <a href="/#contact">Contact</a>
                <a href="/login.html">Login</a>
                <a href="/register.html" class="btn btn--light">Register</a>
            </nav>
        </header>
        <main class="auth">
            <div class="auth__card">
            <h2>Create your account</h2>
            <form action="/api/auth/register" method="POST">
            <div class="field">
                <label for="first">First Name</label>
                <input type="text" id="first" name="first_name" placeholder="Enter your first name" required />
            </div>

            <div class="field">
                <label for="last">Last Name</label>
                <input type="text" id="last" name="last_name" placeholder="Enter your last name" required />
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
            </div>
            <div class="field">
                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact_number" placeholder="Enter your contact number" required />
            </div>
            <div class="field">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required />
            </div>

            <div class="field">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm your password" required />
            </div>

                <button type="submit" class="btn btn--primary">Create Account</button>
            </form>

            <p class="auth__switch">
                Already have an account? <a href="/login.html">Login here</a>
            </p>
            </div>
        </main>
        <script src="/js/register.js"></script>
        <script src="/js/nav.js"></script>
    </body>
</html>
